[window]
padding = {x = 12, y = 12}
dimensions = {columns = 112, lines = 32}
startup_mode = "Windowed"
dynamic_title = true
opacity = 1.0
#blur = false

[font]
size = 11.0
normal = {family = "JetBrainsMono Nerd Font", style = "Regular"}
bold = {family = "JetBrainsMono Nerd Font", style = "Bold"}
italic = {family = "JetBrainsMono Nerd Font", style = "Italic"}

[colors.primary]
background = "#1a1a1a"
foreground = "#f2f2f2"

[colors.normal]
black = "#1a1a1a"
red = "#f07178"
green = "#c3e88d"
yellow = "#ffcb6b"
blue = "#82aaff"
magenta = "#c792ea"
cyan = "#89ddff"
white = "#d0d0d0"

[cursor]
style = {shape = "Beam", blinking = "On"}
